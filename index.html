<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Games Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=landscape">
  <link rel="stylesheet" href="style.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <div id="payment-overlay">
    <div class="payment-modal">
      <img src="logo.png" alt="Psycho Logo" class="psycho-logo" style="margin-bottom:10px;">
      <div class="payment-text">
        Pay <strong>10 rupees</strong> to access this site for life long.<br>
        <span style="font-size:0.95em;">
          This money is used to help poor people. Please don’t misunderstand.
        </span>
      </div>
      <button type="button" id="rzp-button">Pay with Razorpay</button>
      <div class="note">After successful payment, the site will unlock for you forever.</div>
    </div>
  </div>
  <div id="rotate-overlay">Please rotate your device to landscape mode to play!</div>
  <div class="title-row">
    <img src="logo.png" alt="Psycho Logo" class="psycho-logo">
    <h1>Mini Games Hub</h1>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="seq">Alphabet Sequence Catcher</button>
    <button class="tab-btn" data-tab="maths">Crazy Math Challenge</button>
    <button class="tab-btn" data-tab="fruit">Guess the Thing/Fruit</button>
    <button class="tab-btn" data-tab="color">Color Match</button>
  </div>
  <div id="game-container">
    <div class="tab-content" id="seq">
      <canvas id="seq-canvas" width="780" height="320"></canvas>
      <div id="seq-target-sequence"></div>
      <div id="seq-score"></div>
      <div id="seq-message"></div>
    </div>
    <div class="tab-content" id="maths" style="display:none;">
      <div id="math-question"></div>
      <div id="math-options"></div>
      <div id="math-feedback"></div>
      <div id="math-score">Score: 0</div>
    </div>
    <div class="tab-content" id="fruit" style="display:none;">
      <div id="fruit-hint"></div>
      <div id="fruit-options"></div>
      <div id="fruit-feedback"></div>
      <div id="fruit-score">Score: 0</div>
    </div>
    <div class="tab-content" id="color" style="display:none;">
      <div id="color-instruction"></div>
      <div id="color-buttons"></div>
      <div id="color-feedback"></div>
      <div id="color-score">Score: 0</div>
    </div>
  </div>
  <footer style="margin-top:32px; font-size:1.1em; color:#f9d423;">
    Developed by - psycho
  </footer>
  <script src="game.js"></script>
</body>
</html>
